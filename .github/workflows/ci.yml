name: CI

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier . --check

      - name: Lint
        run: npx eslint src/

      - name: Build
        run: npm run build
